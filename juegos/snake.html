<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - TikTakk</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
   
    <div class="container">
        <h1>Snake</h1>
        
        <div class="marcador">
            <h3>Bolitas: <span id="marcador-bolitas">0</span></h3>
            <h3>🏆 Récord: <span id="marcador-record">0</span></h3>
        </div>

        <div class="control-velocidad">
            <label for="selectorVelocidad">Velocidad: </label>
            <select id="selectorVelocidad" onchange="cambiarVelocidad()">
                <option value="220">Normal</option>
                <option value="110" selected>Relajado</option>
            </select>
        </div>

        <canvas id="canvasSnake" width="400" height="400"></canvas>

        <div id="controles-tactiles">
    <button id="btn-up" class="btn-dpad">⬆️</button>
    <div class="dpad-horizontales">
        <button id="btn-left" class="btn-dpad">⬅️</button>
        <button id="btn-right" class="btn-dpad">➡️</button>
    </div>
    <button id="btn-down" class="btn-dpad">⬇️</button>
</div>
        
        <p id="mensajeEstado">Presiona una flecha para empezar</p>
        
        <button onclick="reiniciarJuego()">Reiniciar</button>
        <br>
 <a href="../menu.html" class="btn-volver">← Volver al Menú</a>    </div>

    <script src="snake.js"></script>
</body>
</html>
