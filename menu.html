<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade - Mini Juegos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #13131a;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container-arcade {
            width: 100%;
            max-width: 800px;
            text-align: center;
            background: rgba(30, 30, 47, 0.6);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #38ef7d;
            backdrop-filter: blur(10px);
        }

        header .logo-arcade {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            color: #38ef7d;
            text-shadow: 0 0 20px rgba(56, 239, 125, 0.5);
            margin-bottom: 5px;
        }

        header p {
            color: #a1a1a1;
            margin-top: 0;
            margin-bottom: 40px;
            font-style: italic;
        }

        .games-grid-arcade {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        .game-card-arcade {
            background: #1e1e2f;
            border: 2px solid #2a2a40;
            border-radius: 15px;
            padding: 20px 10px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .game-card-arcade:hover {
            transform: translateY(-5px);
            border-color: #38ef7d;
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.3);
        }

        .game-card-arcade div {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .game-card-arcade h4 {
            margin: 0;
            font-size: 1.1rem;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 0.5px;
        }

        /* Ajustes para pantallas pequeñas de celular */
        @media (max-width: 480px) {
            header .logo-arcade { font-size: 2.2rem; }
            .games-grid-arcade { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .game-card-arcade div { font-size: 2.3rem; }
            .game-card-arcade h4 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container-arcade">
        <header>
            <div class="logo-arcade">🍄 Smurf Cat 🍄</div>
            <p>We live, we love, we lie</p>
        </header>

        <main>
            <div class="games-grid-arcade">
                <a href="juegos/snake.html" class="game-card-arcade"><div>🐍🍎</div><h4>Snake</h4></a>
                <a href="juegos/memorama.html" class="game-card-arcade"><div>🃏💭</div><h4>Memorama</h4></a>
                <a href="juegos/ahorcado.html" class="game-card-arcade"><div>💀🔤</div><h4>Ahorcado</h4></a>
                <a href="juegos/tictactoe.html" class="game-card-arcade"><div>❌⭕</div><h4>Tic Tac Toe</h4></a>
                <a href="juegos/blockblast.html" class="game-card-arcade"><div>🧩🧊</div><h4>Blockblast</h4></a>
                <a href="juegos/tetris.html" class="game-card-arcade"><div>🧱🟦</div><h4>Tetris</h4></a>
            </div>
        </main>
    </div>

</body>
</html>
