<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- smurf cat latinoamericano porque somos de Atotoyork-->
    <title>Smurf Cat - Mini Juegos</title> 
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #13131a;
            font-family: 'Poppins', sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
          
        .controles-audio {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(30, 30, 47, 0.9);
            border: 2px solid #38ef7d;
            padding: 8px 15px;
            border-radius: 30px;
            display: none; 
            align-items: center;
            z-index: 99999; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-audio {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            user-select: none;
            outline: none;
        }

        /* Dentro de la barra */
        .desplegable-audio {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
        }

        .slider-audio {
            width: 80px;
            cursor: pointer;
            accent-color: #38ef7d; /* Color verde personalizado */
            margin-left: 10px;
        }

/*Para que cuando posicione el Mouse sobre el volumen se extienda la barrita tdqv */
        .controles-audio:hover .desplegable-audio {
            width: 90px;
        }
    </style>
</head>
<body>

    <audio id="musicaFondo" src="/the_spectre.mp3" loop></audio>

    <div class="controles-audio" id="controlesAudio">
        <button id="btnMute" class="btn-audio">🔊</button>
        <div class="desplegable-audio">
            <input type="range" id="sliderVolumen" class="slider-audio" min="0" max="1" step="0.01" value="0.25">
        </div>
    </div>

    <div id="pantallaInicio" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999;">
        <h1 style="color: #ffeb3b; font-size: 2.8rem; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,235,59,0.4);">SMURF CAT 🐾 MINI JUEGOS</h1>
        <p style="color: #6c757d; margin-bottom: 35px; font-size: 1.1rem;">La música sonará de fondo de forma continua</p>
        <button id="btnIniciarMundo" style="background: #38ef7d; color: #000; border: none; padding: 18px 50px; font-size: 1.4rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px #38ef7d; transition: 0.2s;">
            ¡EMPEZAR A JUGAR! 🐾
        </button>
    </div>

<iframe id="marcoProyecto" src="/menu.html"></iframe>

    <script>
        const musica = document.getElementById('musicaFondo');
        const controlesAudio = document.getElementById('controlesAudio');
        const btnMute = document.getElementById('btnMute');
        const sliderVolumen = document.getElementById('sliderVolumen');
        
        let ultimoVolumen = 0.25; // Guarda el nivel antes de silenciar

        // Iniciar el juego y mostrar controles musicales
        document.getElementById('btnIniciarMundo').addEventListener('click', () => {
            const pantalla = document.getElementById('pantallaInicio');

            if (musica) {
                musica.volume = 0.25; // Volumen inicial moderado
                musica.play()
                    .then(() => {
                        controlesAudio.style.display = 'flex'; // Muestra el botón flotante en la esquina
                    })
                    .catch(err => console.log("Error al reproducir:", err));
            }

            pantalla.style.opacity = '0';
            setTimeout(() => {
                pantalla.style.display = 'none';
            }, 300);
        });

        // Control manual deslizando la barra (Bajar y subir volumen)
        sliderVolumen.addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            musica.volume = vol;
            
            // Cambiar dinámicamente el ícono según el nivel, con emojis porque no sé poner .png
            if (vol === 0) {
                btnMute.textContent = '🔇';
            } else if (vol < 0.4) {
                btnMute.textContent = '🔉';
            } else {
                btnMute.textContent = '🔊';
            }
        });

        // Botón rápido para silenciar y des-silenciar al alcance de un click :D
        btnMute.addEventListener('click', () => {
            if (musica.volume > 0) {
                ultimoVolumen = musica.volume; // Guardamos el volumen que tenía puesto para sentirnos bien profesionales
                musica.volume = 0;
                sliderVolumen.value = 0;
                btnMute.textContent = '🔇';
            } else {
                // Restauramos el volumen previo (mínimo 0.25 si estaba en 0)
                musica.volume = ultimoVolumen > 0 ? ultimoVolumen : 0.25;
                sliderVolumen.value = musica.volume;
                btnMute.textContent = musica.volume < 0.4 ? '🔉' : '🔊'; //Otra vez los emojis 🤪
            }
        });
    </script>
</body>
</html>
